<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

h1{
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
width:70%;
margin:40px auto;
}

.box{
background:#111;
padding:40px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
transition:0.3s;
}

.box:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00e6e6;
}

.box a{
text-decoration:none;
color:white;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Dashboard</h1>

<div class="grid">

<div class="box">
<a href="/analyzer">Password Analyzer</a>
</div>

<div class="box">
<a href="/generator">Password Generator</a>
</div>

<div class="box">
<a href="/breach">Breach Checker</a>
</div>

<div class="box">
<a href="/tips">Security Tips</a>
</div>

<div class="box">
<a href="/">Back to Home</a>
</div>

</div>

</body>
</html>
