<!DOCTYPE html>
<html>
<head>
<title>Password Breach Check</title>

<style>

body{
font-family: Arial;
text-align:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
margin:0;
overflow:hidden;
}

h1{
margin-top:60px;
}

input{
padding:10px;
margin:10px;
width:250px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:10px 20px;
margin:10px;
border-radius:8px;
border:none;
font-size:16px;
background:#00e6e6;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00baba;
transform:scale(1.05);
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:black;
}

a{
text-decoration:none;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<h1>Password Breach Checker</h1>

<form method="POST">

<input type="password" name="password" placeholder="Enter password to check" required>

<br>

<button type="submit">Check Breach</button>

</form>

{% if result %}

<div class="result">
{{ result }}
</div>

{% endif %}

<br><br>

<a href="/dashboard">  
<button type="button">Back to Dashboard</button>
</a>

<script>

let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

function resizeCanvas(){
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];

for(let x = 0; x < columns; x++){
drops[x] = 1;
}

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#0F0";
ctx.font = fontSize + "px monospace";

for(let i=0;i<drops.length;i++){

let text = letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
